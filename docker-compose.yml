# docker-compose.yml
services:
  # 1. データベース (PostgreSQL)
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: calomeal
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d

  # 2. バックエンド (Go)
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./proto:/app/proto
    depends_on:
      - db
    env_file:
      - ./.env

  # 3. Foods gRPC Service
  foods-service:
    build: ./services/foods
    ports:
      - "50051:50051"
    volumes:
      - ./services/foods:/app
      - ./proto:/app/proto
    depends_on:
      - db
    env_file:
      - ./.env

  # 4. Logs gRPC Service
  logs-service:
    build: ./services/logs
    ports:
      - "50052:50052"
    volumes:
      - ./services/logs:/app
      - ./proto:/app/proto
    depends_on:
      - db
    env_file:
      - ./.env

  # 5. フロントエンド (React)
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

# データの永続化設定
volumes:
  postgres-data: