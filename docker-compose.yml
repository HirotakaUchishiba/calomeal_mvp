# docker-compose.yml
services:
  # 1. データベース (PostgreSQL)
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: calomeal
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d

  # 2. バックエンド (Go)
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/calomeal?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-test-jwt-secret-key}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-test-pool-id}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID:-test-client-id}
      - COGNITO_REGION=${COGNITO_REGION:-us-east-1}
      - GRAPHQL_ENDPOINT=${GRAPHQL_ENDPOINT:-http://localhost:8080/graphql}

  # 3. フロントエンド (React)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

# データの永続化設定
volumes:
  postgres-data: