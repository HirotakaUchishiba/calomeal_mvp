# .github/workflows/ci.yml

name: CI

# ワークフローが実行されるタイミングを定義
on:
  pull_request:
    [cite_start]branches: [ develop ] # developブランチへのプルリクエスト時に実行 [cite: 113]

# 実行されるジョブを定義
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリのコードをチェックアウト [cite: 115]
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Go言語の環境をセットアップ [cite: 116]
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # 3. バックエンドのテストを実行 
      - name: Run backend tests
        run: go test ./...
        working-directory: ./backend

      # 4. Node.jsの環境をセットアップ [cite: 118]
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 5. フロントエンドの依存関係をインストールしてテストを実行 
      - name: Run frontend tests
        run: |
          npm install
          npm run lint
          npm run test
        working-directory: ./frontend

      # 6. E2Eテスト用の依存関係をインストール
      - name: Install E2E test dependencies
        run: |
          npm install
          npx playwright install --with-deps
        working-directory: ./

      # 7. アプリケーションを起動
      - name: Start application
        run: |
          docker-compose up -d
          # アプリケーションの起動を待機
          sleep 30
        working-directory: ./

      # 8. E2Eテストを実行
      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: ./
        env:
          CI: true

      # 9. E2Eテスト結果のレポートをアップロード
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30