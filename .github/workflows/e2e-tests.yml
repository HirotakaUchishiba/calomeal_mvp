# .github/workflows/e2e-tests.yml

name: E2E Tests

# ワークフローが実行されるタイミングを定義
on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop, main ]
  workflow_dispatch: # 手動実行も可能

# 実行されるジョブを定義
jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 複数のブラウザでテストを実行
        browser: [chromium, firefox, webkit]
    
    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.jsの環境をセットアップ
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. 依存関係をインストール
      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps ${{ matrix.browser }}
        working-directory: ./

      # 4. アプリケーションを起動
      - name: Start application
        run: |
          docker-compose up -d
          # アプリケーションの起動を待機
          sleep 30
        working-directory: ./

      # 5. アプリケーションのヘルスチェック
      - name: Health check
        run: |
          # フロントエンドのヘルスチェック
          curl -f http://localhost:3000 || exit 1
          # バックエンドのヘルスチェック
          curl -f http://localhost:8080/health || exit 1

      # 6. E2Eテストを実行
      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: ./
        env:
          CI: true

      # 7. テスト結果のレポートをアップロード
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      # 8. テスト失敗時のスクリーンショットをアップロード
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

  # テスト結果のサマリー
  test-summary:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## E2Eテスト結果" >> $GITHUB_STEP_SUMMARY
          echo "- Chromium: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Firefox: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- WebKit: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
