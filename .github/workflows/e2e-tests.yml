# .github/workflows/e2e-tests.yml

name: E2E Tests

# ワークフローが実行されるタイミングを定義
on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop, main ]
  workflow_dispatch: # 手動実行も可能

# 実行されるジョブを定義
jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 複数のブラウザでテストを実行
        browser: [chromium, firefox, webkit]
    
    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.jsの環境をセットアップ
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. 依存関係をインストール
      - name: Install dependencies
        run: |
          npm install
        working-directory: ./

      # 4. Playwrightブラウザをインストール
      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps ${{ matrix.browser }}
        timeout-minutes: 10
        working-directory: ./

      # 5. アプリケーションを起動
      - name: Start application
        run: |
          # E2Eテスト用の環境変数を設定
          cat > .env << EOF
          DATABASE_URL=postgres://postgres:password@db:5432/calomeal?sslmode=disable
          JWT_SECRET=test-jwt-secret-key-for-e2e-testing
          COGNITO_USER_POOL_ID=test-pool-id
          COGNITO_CLIENT_ID=test-client-id
          COGNITO_REGION=us-east-1
          GRAPHQL_ENDPOINT=http://localhost:8080/graphql
          EOF
          echo "環境変数ファイルを作成しました"
          cat .env
          echo "Docker Composeでアプリケーションを起動中..."
          docker compose up -d
          echo "アプリケーションの起動を待機中..."
          sleep 30
          echo "Docker Composeの状況を確認:"
          docker compose ps
          echo "フロントエンドコンテナのログ:"
          docker compose logs frontend --tail=20
          echo "バックエンドコンテナのログ:"
          docker compose logs backend --tail=20
          echo "データベースコンテナのログ:"
          docker compose logs db --tail=10
        working-directory: ./

      # 6. アプリケーションのヘルスチェック
      - name: Health check
        run: |
          echo "アプリケーションの起動を待機中..."
          echo "現在のDocker Compose状況:"
          docker compose ps
          echo "ポートの使用状況を確認:"
          netstat -tlnp || ss -tlnp || echo "ポート確認コマンドが利用できません"
          # 最大60秒間、10秒間隔でヘルスチェック
          for i in {1..6}; do
            echo "ヘルスチェック試行 $i/6"
            echo "フロントエンド (http://localhost:3000) をチェック..."
            if curl -f http://localhost:3000; then
              echo "✅ フロントエンドが応答しています"
            else
              echo "❌ フロントエンドが応答していません"
              curl -v http://localhost:3000 || echo "curl詳細エラー"
            fi
            echo "バックエンド (http://localhost:8080/health) をチェック..."
            if curl -f http://localhost:8080/health; then
              echo "✅ バックエンドが応答しています"
              echo "アプリケーションが正常に起動しました"
              exit 0
            else
              echo "❌ バックエンドが応答していません"
              curl -v http://localhost:8080/health || echo "curl詳細エラー"
            fi
            echo "アプリケーションの起動を待機中... (10秒後再試行)"
            sleep 10
          done
          echo "アプリケーションの起動に失敗しました"
          echo "最終的なDocker Compose状況:"
          docker compose ps
          echo "最終的なDocker ログ:"
          docker compose logs --tail=100
          exit 1

      # 7. E2Eテストを実行
      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.browser }}
        working-directory: ./
        env:
          CI: true

      # 8. テスト結果のレポートをアップロード
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      # 9. テスト失敗時のスクリーンショットをアップロード
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

      # 10. アプリケーションの停止
      - name: Stop application
        if: always()
        run: |
          docker compose down
        working-directory: ./

  # テスト結果のサマリー
  test-summary:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## 🧪 E2Eテスト結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ブラウザ | 結果 |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "✅ すべてのテストが成功しました！" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ テストが失敗しました。詳細はログを確認してください。" >> $GITHUB_STEP_SUMMARY
          fi
