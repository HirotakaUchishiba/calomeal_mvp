# .github/workflows/deploy.yml

name: Deploy

# ワークフローが実行されるタイミングを定義
on:
  push:
    branches: [ develop ] # developブランチへのプッシュ時に実行

# 実行されるジョブを定義
jobs:
  # E2Eテストを実行してからデプロイ
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Go言語の環境をセットアップ
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # 3. バックエンドのテストを実行
      - name: Run backend tests
        run: go test ./...
        working-directory: ./backend

      # 4. Node.jsの環境をセットアップ
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 5. フロントエンドのテストを実行
      - name: Run frontend tests
        run: |
          npm install
          npm run lint
          npm run test
        working-directory: ./frontend

      # 6. E2Eテスト用の依存関係をインストール
      - name: Install E2E test dependencies
        run: |
          npm install
          npx playwright install --with-deps
        working-directory: ./

      # 7. アプリケーションを起動
      - name: Start application
        run: |
          docker-compose up -d
          # アプリケーションの起動を待機
          sleep 30
        working-directory: ./

      # 8. E2Eテストを実行
      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: ./
        env:
          CI: true

      # 9. E2Eテストが成功した場合のみデプロイを実行
      - name: Deploy to staging
        if: success()
        run: |
          echo "E2Eテストが成功しました。デプロイを実行します。"
          # ここに実際のデプロイコマンドを追加
          # 例: terraform apply, docker push, kubectl apply など
        env:
          # デプロイに必要な環境変数を設定
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 10. デプロイ結果の通知
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ デプロイが成功しました"
          else
            echo "❌ デプロイが失敗しました"
          fi
