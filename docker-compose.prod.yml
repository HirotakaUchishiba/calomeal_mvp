version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: calomeal-db-prod
    environment:
      POSTGRES_DB: calomeal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calomeal"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calomeal-network

  # Foods gRPC Service
  foods:
    build:
      context: ./services/foods
      dockerfile: Dockerfile
    container_name: calomeal-foods-prod
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/calomeal?sslmode=disable
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calomeal-network

  # Logs gRPC Service
  logs:
    build:
      context: ./services/logs
      dockerfile: Dockerfile
    container_name: calomeal-logs-prod
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/calomeal?sslmode=disable
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "50052:50052"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50052"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calomeal-network

  # Analytics gRPC Service
  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    container_name: calomeal-analytics-prod
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/calomeal?sslmode=disable
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    ports:
      - "50053:50053"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50053"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calomeal-network

  # BFF GraphQL Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calomeal-backend-prod
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@db:5432/calomeal?sslmode=disable
      - FOOD_SERVICE_ADDR=foods:50051
      - LOGS_SERVICE_ADDR=logs:50052
      - ANALYTICS_SERVICE_ADDR=analytics:50053
      - BFF_PORT=8080
      - BFF_HOST=0.0.0.0
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      foods:
        condition: service_healthy
      logs:
        condition: service_healthy
      analytics:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calomeal-network

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calomeal-frontend-prod
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_APP_ENV=production
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calomeal-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: calomeal-nginx-prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calomeal-network

volumes:
  postgres_data:
    driver: local

networks:
  calomeal-network:
    driver: bridge
